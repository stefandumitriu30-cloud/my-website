<svg viewBox="0 0 1600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background -->
  <rect width="1600" height="400" fill="#f5f5f5"/>
  
  <!-- Brain Icon -->
  <g transform="translate(1350, 120)">
    <!-- Brain outline -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="#2563eb" stroke-width="3"/>
    
    <!-- Brain lobes -->
    <path d="M 30 40 Q 25 35 30 25 Q 35 30 35 40" fill="#2563eb"/>
    <path d="M 70 40 Q 75 35 70 25 Q 65 30 65 40" fill="#2563eb"/>
    <path d="M 35 60 Q 30 65 35 75 Q 40 70 40 60" fill="#2563eb"/>
    <path d="M 65 60 Q 70 65 65 75 Q 60 70 60 60" fill="#2563eb"/>
    <path d="M 50 35 Q 45 30 50 20 Q 55 30 55 35" fill="#2563eb"/>
    <path d="M 50 70 Q 45 75 50 85 Q 55 75 55 70" fill="#2563eb"/>
    
    <!-- Brain wrinkles -->
    <path d="M 40 50 Q 45 45 50 50 Q 55 45 60 50" stroke="#2563eb" stroke-width="2" fill="none"/>
    <path d="M 40 55 Q 45 60 50 55 Q 55 60 60 55" stroke="#2563eb" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Main Text -->
  <text x="50" y="140" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#2563eb">
    Vantage Finance & Tech
  </text>
  
  <!-- Underline -->
  <line x1="50" y1="170" x2="1300" y2="170" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Tagline -->
  <text x="50" y="270" font-family="Arial, sans-serif" font-size="48" fill="#6b7280" font-style="italic">
    Precision Finance. Agile Delivery. Integrated Solutions.
  </text>
</svg>